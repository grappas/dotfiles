format = """
[оӮ¶](color_orange)\
$os\
$username\
$hostname\
[оӮ°](bg:color_yellow fg:color_orange)\
$directory\
[оӮ°](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[оӮ°](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[оӮ°](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[оӮ°](fg:color_bg3 bg:color_bg1)\
$time\
[оӮҙ ](fg:color_bg1)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
AOSC = "пҢҒ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
EndeavourOS = "пҶ—"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"
Pop = "пҢӘ"

[username]
show_always = true
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "

[git_branch]
symbol = "пҗҳ"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "fg:color_fg0 bg:color_aqua"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "вҡ”пёҸ ${count} "
ahead = "вҮЎ${count} "
behind = "вҮЈ${count} "
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count} "
untracked = "?${count} "
stashed = "рҹ“Ұ${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "В»${count} "
deleted = "вңҳ${count} "

[nodejs]
symbol = "оңҳ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = "оҳһ "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = "оҳқ "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = "оү–"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = "оҳҙ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = "оҳҹ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = "оҳҶ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[docker_context]
symbol = "пҢҲ"
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:#83a598 bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[ пҗә $time ](fg:color_fg0 bg:color_bg1)]($style)'

[hostname]
ssh_only = true
style = "fg:$color_red bg:color_orange"
format = '[on $hostname ]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[пҗІ](bold fg:color_green)'
error_symbol = '[пҗІ](bold fg:color_red)'
vimcmd_symbol = '[пҗҙ](bold fg:color_green)'
vimcmd_replace_one_symbol = '[пҗҙ](bold fg:color_purple)'
vimcmd_replace_symbol = '[пҗҙ](bold fg:color_purple)'
vimcmd_visual_symbol = '[пҗҙ](bold fg:color_yellow)'
