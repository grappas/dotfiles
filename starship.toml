"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](#458588)\
$os\
$username\
[](bg:#CC241D fg:#458588)\
$directory\
[](fg:#CC241D bg:#D65D0E)\
$git_branch\
$git_status\
[](fg:#D65D0E bg:#98971A)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$maven\
$nodejs\
$nim\
$rust\
$scala\
[](fg:#98971A bg:#689D6A)\
$docker_context\
[](fg:#689D6A bg:#B57614)\
$time\
[ ](fg:#B57614)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:#458588"
style_root = "bg:#458588"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:#458588"
disabled = true # Disabled by default

[directory]
style = "bg:#CC241D"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
# Keep in mind that the order matters. For example:
# "Important Documents" = " 󰈙 "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important 󰈙 " = " 󰈙 "

[c]
symbol = " "
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "bg:#689D6A"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = " "
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "bg:#D65D0E"
format = '[ $symbol $branch ]($style)'


[git_status]
style = "bg:#D65D0E"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "⚔️ ${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "📦${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

[golang]
symbol = " "
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[maven]
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "bg:#98971A"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#B57614"
format = '[ ⏲ $time ]($style)'

